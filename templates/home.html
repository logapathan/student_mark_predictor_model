<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Student Performance Predictor</title>

    <!-- Google Font -->
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        font-family: "Poppins", sans-serif;
        background: linear-gradient(to right, #4facfe, #00f2fe);
        margin: 0;
        padding: 0;
      }

      .container {
        width: 400px;
        margin: 50px auto;
        background: #fff;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      }

      h1 {
        text-align: center;
        margin-bottom: 20px;
        font-size: 22px;
        color: #333;
      }

      label {
        font-weight: 500;
        display: block;
        margin-top: 10px;
        margin-bottom: 5px;
      }

      select,
      input {
        width: 100%;
        padding: 10px;
        border-radius: 8px;
        border: 1px solid #ccc;
        margin-bottom: 10px;
        font-size: 14px;
      }

      select:focus,
      input:focus {
        outline: none;
        border-color: #4facfe;
      }

      .btn {
        width: 100%;
        padding: 12px;
        background: #4facfe;
        border: none;
        color: white;
        font-size: 16px;
        border-radius: 8px;
        cursor: pointer;
        margin-top: 15px;
      }

      .btn:hover {
        background: #3a8dde;
      }

      .result {
        text-align: center;
        margin-top: 20px;
        font-weight: 600;
        color: #333;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1>Student Exam Performance Predictor</h1>

      <form action="{{ url_for('predict') }}" method="post">
        <label>Gender</label>
        <select name="gender" required>
          <option disabled selected>Select Gender</option>
          <option value="male">Male</option>
          <option value="female">Female</option>
        </select>

        <label>Race / Ethnicity</label>
        <select name="race_ethnicity" required>
          <option disabled selected>Select Ethnicity</option>
          <option value="group A">Group A</option>
          <option value="group B">Group B</option>
          <option value="group C">Group C</option>
          <option value="group D">Group D</option>
          <option value="group E">Group E</option>
        </select>

        <label>Parental Education</label>
        <select name="parental_level_of_education" required>
          <option disabled selected>Select Education</option>
          <option value="associate's degree">Associate's Degree</option>
          <option value="bachelor's degree">Bachelor's Degree</option>
          <option value="high school">High School</option>
          <option value="master's degree">Master's Degree</option>
          <option value="some college">Some College</option>
          <option value="some high school">Some High School</option>
        </select>

        <label>Lunch Type</label>
        <select name="lunch" required>
          <option disabled selected>Select Lunch Type</option>
          <option value="free/reduced">Free/Reduced</option>
          <option value="standard">Standard</option>
        </select>

        <label>Test Preparation</label>
        <select name="test_preparation_course" required>
          <option disabled selected>Select Course</option>
          <option value="none">None</option>
          <option value="completed">Completed</option>
        </select>

        <label>Reading Score</label>
        <input
          type="number"
          name="reading_score"
          min="0"
          max="100"
          placeholder="Enter reading score"
          required
        />

        <label>Writing Score</label>
        <input
          type="number"
          name="writing_score"
          min="0"
          max="100"
          placeholder="Enter writing score"
          required
        />

        <button class="btn" type="submit">Predict Maths Score</button>
      </form>

      <div class="result">
        {% if results %} Prediction: {{ results }} {% endif %}
      </div>
    </div>
  </body>
</html>
